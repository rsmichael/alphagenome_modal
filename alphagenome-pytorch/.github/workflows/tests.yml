name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Really want to run unit tests manually'
        required: false
        default: 'Manual rerun'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch to avoid downloading CUDA/NVIDIA drivers
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install alphagenome_research
          pip install git+https://github.com/google-deepmind/alphagenome_research.git
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest -m "unit and not slow" --tb=short
